<!DOCTYPE html>
<html>
<head>
<script>
(function () {
  var target = "https://www.youtube.com/@cosedalmondoofficial?sub_confirmation=1";

  var isAndroid = /Android/i.test(navigator.userAgent);
  var isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

  if (isAndroid) {
    window.location = "intent://www.youtube.com/@cosedalmondoofficial?sub_confirmation=1#Intent;scheme=https;package=com.google.android.youtube;end";
    setTimeout(function () {
      window.location.href = target;
    }, 1200);

  } else if (isIOS) {
    window.location = "youtube://www.youtube.com/@cosedalmondoofficial";
    setTimeout(function () {
      window.location.href = target;
    }, 1200);

  } else {
    window.location.href = target;
  }
})();
</script>
</head>
<body></body>
</html>
